<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ላዝ ቢንጎ - ቪአይፒ</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0e15;
            color: #00f0ff;
            margin: 0;
            padding: 12px;
            overflow-x: hidden;
            text-align: center;
        }
        h1 {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            font-size: 24px;
            margin: 5px 0 15px 0;
        }
        .board-title {
            color: #00f0ff;
            font-size: 14px;
            margin: 10px 0 5px 0;
            text-align: left;
            font-weight: bold;
            text-shadow: 0 0 5px #00f0ff;
        }
        
        /* --- ገጽ 1፦ የካርቴላ መምረጫ ክፍል --- */
        #selectionPage { display: block; }
        .header-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }
        .header-box {
            background: #161925;
            border: 1px solid #ff00ff;
            box-shadow: 0 0 8px rgba(255, 0, 255, 0.3);
            border-radius: 8px;
            padding: 8px 2px;
            text-align: center;
        }
        .box-title { font-size: 11px; color: #ff00ff; margin-bottom: 4px; }
        .box-value { font-size: 13px; font-weight: bold; color: #fff; }
        
        /* የ 30 ሰከንድ መጠበቂያ ሳጥን */
        .waiting-overlay {
            display: none;
            background: rgba(22, 25, 37, 0.95);
            border: 2px solid #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
            border-radius: 12px;
            padding: 25px 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .waiting-timer {
            font-size: 54px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff;
            margin: 15px 0;
        }

        .main-container {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            padding: 10px;
        }
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 380px;
            overflow-y: auto;
        }
        .card-row {
            background: #161925;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 6px;
            padding: 14px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .card-row:active { 
            background: #ff00ff; 
            border-color: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
        }
        .card-number { font-size: 15px; font-weight: bold; color: #fff; }
        .card-status { font-size: 12px; color: #00f0ff; background: rgba(0, 240, 255, 0.1); padding: 3px 10px; border-radius: 10px; font-weight: bold; }

        /* --- ገጽ 2፦ ዋናው የጨዋታ ሜዳ ክፍል --- */
        #gamePage { display: none; }
        .game-header {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        .game-header-box {
            background: #161925;
            border: 1px solid #00f0ff;
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
            border-radius: 8px;
            padding: 8px 2px;
            text-align: center;
        }
        .game-layout {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        
        .left-numbers {
            flex: 2.5;
            background: rgba(0, 240, 255, 0.02);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 8px;
            padding: 5px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            max-height: 400px;
            overflow-y: auto;
        }
        .num-slot {
            background: #11131c;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #444;
            font-size: 12px;
            padding: 4px 0;
            border-radius: 4px;
            font-weight: bold;
        }
        .num-slot.called {
            background: #00f0ff;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 8px #00f0ff;
        }

        .center-cartela { flex: 5; }
        .bingo-letters {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            font-weight: bold;
            color: #ff00ff;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid #00f0ff;
            border-radius: 8px;
            padding: 6px;
        }
        .cell {
            background: #161925;
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #fff;
            border-radius: 4px;
            padding: 14px 0;
            font-size: 14px;
            font-weight: bold;
        }
        .cell.marked {
            background: #ff00ff;
            border-color: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
        }

        .right-display {
            flex: 2.5;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .random-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #ff00ff;
            box-shadow: 0 0 12px #ff00ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: #161925;
        }
        .btn-bingo {
            background: linear-gradient(45deg, #ff00ff, #00f0ff);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            padding: 12px 5px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <h1>🎰 ላዝ ቢንጎ 🎰</h1>

    <!-- ================= ገጽ 1፦ የካርቴላ መምረጫ ክፍል ================= -->
    <div id="selectionPage">
        <div class="header-grid">
            <div class="header-box"><div class="box-title">Room</div><div class="box-value">ላዝ ሩም</div></div>
            <div class="header-box"><div class="box-title">Sold</div><div class="box-value" id="soldCount">00</div></div>
            <div class="header-box"><div class="box-title">Time</div><div class="box-value">3:05</div></div>
            <div class="header-box"><div class="box-title">Balance</div><div class="box-value">250.00</div></div>
        </div>

        <!-- የ 30 ሰከንድ መጠበቂያ ሳጥን -->
        <div class="waiting-overlay" id="waitingOverlay">
            <div style="font-size: 14px; color: #00f0ff; font-weight: bold;">⏳ የይለፍ ቆጠራ ተጀምሯል! እባክዎ ይጠብቁ...</div>
            <div id="selectedInfo" style="font-size:13px; color:#fff; margin-top:6px; font-weight: bold;"></div>
            <div class="waiting-timer" id="waitingTimer">30</div>
            <div style="font-size: 11px; color: #ff00ff;">ሰው ቢገባም ባይገባም በራሱ ጊዜ ያሻግረዎታል!</div>
        </div>

        <div class="main-container" id="cardsTableContainer">
            <div class="board-title">📋 የካርቴላዎች ማውጫ (1 - 200)</div>
            <div class="cards-list" id="cardsList"></div>
        </div>
    </div>

    <!-- ================= ገጽ 2፦ ዋናው የጨዋታ ሜዳ ክፍል ================= -->
    <div id="gamePage">
        <div class="game-header">
            <div class="game-header-box"><div class="box-title">ደራሽ</div><div class="box-value">88 ETB</div></div>
            <div class="game-header-box"><div class="box-title">ተጫዋቾች</div><div class="box-value">12</div></div>
            <div class="game-header-box"><div class="box-title">Balls</div><div class="box-value" id="ballCount">00/75</div></div>
        </div>

        <div class="game-layout">
            <div class="left-numbers" id="leftNumbersBoard"></div>
            <div class="center-cartela">
                <div id="selectedCardTitle" style="font-size:13px; color:#00f0ff; margin-bottom:6px; font-weight:bold; text-align:left;"></div>
                <div class="bingo-letters"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
                <div class="grid-container" id="cardGrid"></div>
            </div>
            <div class="right-display">
                <div style="font-size:12px; color:#00f0ff; font-weight:bold;">እጣ ቁጥር</div>
                <div class="random-circle" id="luckyNumber">-</div>
                <button class="btn-bingo" onclick="claimBingo()">🏆 ቢንጎ!</button>
            </div>
        </div>
    </div>

    <script>
        const selectionPage = document.getElementById('selectionPage');
        const gamePage = document.getElementById('gamePage');
        const cardsList = document.getElementById('cardsList');
        const leftNumbersBoard = document.getElementById('leftNumbersBoard');
        const cardGrid = document.getElementById('cardGrid');
        const luckyNumberDisplay = document.getElementById('luckyNumber');
        const ballCountDisplay = document.getElementById('ballCount');
        const selectedCardTitle = document.getElementById('selectedCardTitle');
        const waitingOverlay = document.getElementById('waitingOverlay');
